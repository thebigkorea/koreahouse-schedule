<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한국의집 근무스케줄관리</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="wrap">

    <header class="header">
      <div>
        <h1>한국의집 근무스케줄관리</h1>
        <p>월별 근무표 작성 · 주간 스케줄 작성 · 근무표 조회</p>
      </div>
      <button onclick="printSchedule()" class="print-btn">근무표 출력</button>
    </header>

    <section class="tabs">            
      <button class="tab active" onclick="showTab('admin')">관리자 작성</button>
      <button class="tab-btn"
        onclick="window.open('https://docs.google.com/spreadsheets/d/1y1f4noa90DCA_YxZYx9MXe_A523Z5g2raeLU4d4wwb4/edit?gid=1328921358#gid=1328921358', '_blank')">
        주간 스케줄표 작성
      </button>
      <button class="tab" onclick="showTab('view')">근무표 조회</button>
      <button class="tab" onclick="showTab('staff')">직원등록</button>
    </section>

   

    <section id="admin" class="panel active">
      <h2>관리자 월별 근무표 작성</h2>

      <div class="toolbar schedule-toolbar">

  <input type="month" id="scheduleMonth">

  <button onclick="loadScheduleBase()">
    근무표 생성
  </button>

  <button onclick="copyPrevMonthWeekPattern()" class="pattern-btn">
    전월 요일패턴 불러오기
  </button>

  <button onclick="saveMonthlySchedule()" class="save">
    근무표 저장
  </button>

  <button onclick="loadSavedSchedule()" class="load-btn">
    근무표 불러오기
  </button>

</div>

<!-- ▼▼ 여기 추가 ▼▼ -->
<div id="workStatus" class="work-status hidden">
  처리중입니다...
</div>
<!-- ▲▲ 여기까지 ▲▲ -->

<div class="legend">
  <span><b class="work"></b> 근무</span>
  <span><b class="request-off"></b> 직원 희망휴무</span>
  <span><b class="admin-off"></b> 관리자 지정휴무</span>
  <span><b class="confirmed-off"></b> 최종확정휴무</span>
  <span><b class="annual"></b> 연차</span>
</div>

      <div id="offRequestSummary" class="summary"></div>

      <div class="table-scroll">
        <table id="scheduleTable"></table>
      </div>
    </section>

    <section id="view" class="panel">
      <h2>직원별 근무표 조회</h2>

      <div class="toolbar">
        <input type="month" id="viewMonth">
        <select id="viewName"></select>
        <button onclick="viewEmployeeSchedule()">조회</button>
      </div>

      <div id="employeeScheduleResult" class="result-box"></div>
    </section>

    <section id="staff" class="panel">
      <h2>직원등록</h2>

      <div class="form-grid">
        <label>
          성명
          <input type="text" id="staffName" placeholder="직원명 입력">
        </label>

        <label>
          구분
          <select id="staffType">
            <option value="아르바이트">아르바이트</option>
            <option value="계약직">계약직</option>
            <option value="직원">직원</option>
          </select>
        </label>

        <label>
          직무
          <select id="staffRole">
            <option value="홀">홀</option>
            <option value="주방">주방</option>
            <option value="세척">세척</option>
            <option value="기타">기타</option>
          </select>
        </label>
      </div>

      <button class="main-btn" onclick="saveStaff()">직원 등록</button>

      <h3>등록 직원</h3>
      <div id="staffList" class="staff-list"></div>
    </section>

  </div>

  <script src="script.js"></script>
  <div id="printScheduleArea"></div>
</body>
</html>
